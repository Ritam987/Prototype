services:
  supabase-db:
    image: ${SUPABASE_POSTGRES_IMAGE:-supabase/postgres:15.14.1.138_amd64}
    container_name: careerpath-supabase-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-careerpath}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    ports:
      - "${POSTGRES_PORT:-54322}:5432"
    volumes:
      - supabase_db_data:/var/lib/postgresql/data
      - ./supabase/migrations/init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  supabase_db_data:
